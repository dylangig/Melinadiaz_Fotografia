name = "melina-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ── Variables de entorno (no secretas) ───────────────────────────────────────
[vars]
R2_PUBLIC_URL = "https://imagenes.melinadiazfotografia.com.ar"
ALLOWED_ORIGINS = "https://melinadiazfotografia.com.ar,https://www.melinadiazfotografia.com.ar,https://melinadiaz-fotografia.pages.dev/"

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "melina-db"
database_id = "ba3f5059-34c8-4c1d-a139-dee578495507"
# El database_id lo obtenés al crear la base con:
# wrangler d1 create melina-db

# ── R2 Bucket ─────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "fotosmelinaapp"

# ── Secrets (NO van acá, se setean con wrangler secret put) ──────────────────
# ADMIN_PASSWORD → wrangler secret put ADMIN_PASSWORD
# JWT_SECRET     → wrangler secret put JWT_SECRET
