    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #333;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        header {
            background-color: #ffffff;
            padding: 10px 20px;
            text-align: center;
            transition: all 0.4s ease;
            overflow: hidden;
            line-height: 0;
        }
        header img {
            width: 280px;
            height: auto;
            object-fit: contain;
            transition: all 0.4s ease;
        }
        body.scrolled header {
            padding: 0;
            max-height: 0;
        }

        nav {
            background-color: #333;
            padding: 15px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }
        nav .nav-logo {
            display: none;
            opacity: 0;
            transition: all 0.4s ease;
            margin-right: auto;
        }
        nav .nav-logo img {
            height: 45px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        body.scrolled nav { justify-content: flex-start; }
        body.scrolled nav .nav-logo { display: block; opacity: 1; }

        nav .nav-links {
            display: flex;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        nav a:hover { color: #f48fb1; }

        .nav-dropdown { position: relative; display: inline-block; }
        .nav-dropdown-toggle { cursor: pointer; user-select: none; }
        .nav-dropdown-menu {
            display: none !important;
            position: absolute;
            top: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            min-width: 180px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            z-index: 9999;
            flex-direction: column;
        }
        .nav-dropdown.open .nav-dropdown-menu { display: flex !important; }
        .nav-dropdown-menu a {
            display: block;
            padding: 12px 20px;
            margin: 0;
            font-size: 13px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-dropdown-menu a:hover { background-color: #444; }

        .hamburguesa {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }
        .hamburguesa span {
            display: block;
            width: 25px;
            height: 2px;
            background: white;
            transition: 0.3s;
        }

        .contenido {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        h2 { color: #222; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #333;
            color: white;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #555; }

        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #f9f9f9;
            color: #666;
            margin-top: 80px;
            font-size: 13px;
            border-top: 1px solid #eee;
        }
        .footer-redes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .footer-redes a {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 50%;
            transition: 0.3s;
        }
        .footer-redes a:hover { background-color: #333; border-color: #333; }
        .footer-redes a svg { width: 18px; height: 18px; fill: #666; transition: 0.3s; }
        .footer-redes a:hover svg { fill: white; }

        @media (max-width: 768px) {
            .hamburguesa { display: flex; }
            nav .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #333;
                padding: 20px 0;
            }
            nav .nav-links.open { display: flex; }
            nav a { margin: 10px 0; }
            .nav-dropdown-menu { position: static; transform: none; background-color: #444; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const lightbox = GLightbox({ selector: '.glightbox', touchNavigation: true, loop: true });
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                document.body.classList.add('scrolled');
            } else {
                document.body.classList.remove('scrolled');
            }
        });

        document.querySelector('.nav-dropdown-toggle').addEventListener('click', function(e) {
            e.preventDefault();
            this.closest('.nav-dropdown').classList.toggle('open');
        });

        const hamburguesa = document.getElementById('hamburguesa');
        const navLinks = document.getElementById('nav-links');
        hamburguesa.addEventListener('click', () => {
            navLinks.classList.toggle('open');
        });
    </script>
