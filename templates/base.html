    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fff5f9;
            color: #333;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            padding: 6px 20px 4px;
            text-align: center;
            transition: all 0.4s ease;
            overflow: hidden;
            line-height: 0;
        }
        header img {
            width: 280px;
            height: auto;
            object-fit: contain;
            transition: all 0.4s ease;
        }
        body.scrolled header {
            padding: 0;
            max-height: 0;
        }

        /* NAV */
        nav {
            background-color: #f48fb1;
            padding: 12px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }
        nav .nav-logo {
            display: none;
            opacity: 0;
            transition: all 0.4s ease;
            margin-right: auto;
        }
        nav .nav-logo img {
            height: 52px;
            width: auto;
            object-fit: contain;
        }
        body.scrolled nav { justify-content: flex-start; }
        body.scrolled nav .nav-logo { display: block; opacity: 1; }

        nav .nav-links {
            display: flex;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        nav a:hover { text-decoration: underline; }

        /* DROPDOWN */
        .nav-dropdown { position: relative; display: inline-block; }
        .nav-dropdown-toggle { cursor: pointer; user-select: none; }
        .nav-dropdown-menu {
            display: none !important;
            position: absolute;
            top: calc(100% + 16px);
            left: 50%;
            transform: translateX(-50%);
            background-color: #e91e8c;
            border-radius: 10px;
            min-width: 170px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            flex-direction: column;
        }
        .nav-dropdown.open .nav-dropdown-menu { display: flex !important; }
        .nav-dropdown-menu a {
            display: block;
            padding: 13px 20px;
            margin: 0;
            font-size: 14px;
            color: white;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .nav-dropdown-menu a:last-child { border-bottom: none; }
        .nav-dropdown-menu a:hover { background-color: #c2185b; text-decoration: none; }

        /* HAMBURGUESA */
        .hamburguesa {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            margin-left: auto;
            z-index: 1001;
        }
        .hamburguesa span {
            display: block;
            width: 24px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburguesa.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburguesa.open span:nth-child(2) { opacity: 0; }
        .hamburguesa.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* CONTENIDO */
        .contenido {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 60px;
        }
        .seccion-full { margin-left: -60px; margin-right: -60px; }
        h2 { color: #e91e8c; margin-bottom: 10px; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background-color: #f48fb1;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #e91e8c; }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #f48fb1;
            color: white;
            margin-top: 60px;
            font-size: 14px;
        }
        .footer-redes {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .footer-redes a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: background-color 0.3s;
            padding: 0;
            margin: 0;
        }
        .footer-redes a:hover { background-color: rgba(255,255,255,0.4); }
        .footer-redes a svg { width: 22px; height: 22px; }

        /* FOCUS ACCESIBILIDAD */
        a:focus-visible, button:focus-visible {
            outline: 3px solid #d81b60;
            outline-offset: 3px;
            border-radius: 4px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .contenido { padding: 0 15px; margin: 20px auto; }

            .hamburguesa { display: flex; }

            nav { flex-wrap: wrap; padding: 12px 20px; justify-content: space-between; }

            nav .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                padding: 12px 0 8px;
                gap: 0;
                align-items: stretch;
            }
            nav .nav-links.open { display: flex; }

            nav .nav-links > a {
                margin: 0;
                padding: 13px 8px;
                border-bottom: 1px solid rgba(255,255,255,0.15);
                font-size: 15px;
            }
            nav .nav-links > a:last-child { border-bottom: none; }

            .nav-dropdown { width: 100%; }
            .nav-dropdown-toggle {
                display: block;
                width: 100%;
                padding: 13px 8px;
                border-bottom: 1px solid rgba(255,255,255,0.15);
                margin: 0;
            }
            .nav-dropdown-menu {
                position: static !important;
                transform: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                background-color: rgba(0,0,0,0.12) !important;
                min-width: 100% !important;
            }
            .nav-dropdown-menu a {
                padding: 11px 24px !important;
                font-size: 13px !important;
                text-align: left !important;
            }

            body.scrolled nav .nav-logo { display: none; }
        }
    </style>

    <script>
        const lightbox = GLightbox({ touchNavigation: true, loop: true });

        // Scroll
        let scrolled = false;
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            if (!scrolled && y > 120) {
                scrolled = true;
                document.body.classList.add('scrolled');
            } else if (scrolled && y < 40) {
                scrolled = false;
                document.body.classList.remove('scrolled');
            }
        });

        // galería
        document.querySelector('.nav-dropdown-toggle').addEventListener('click', function(e) {
            e.preventDefault();
            this.closest('.nav-dropdown').classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-dropdown')) {
                document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
            }
        });

        // Hamburguesa
        const hamburguesa = document.getElementById('hamburguesa');
        const navLinks = document.getElementById('nav-links');
        hamburguesa.addEventListener('click', function() {
            const isOpen = this.classList.toggle('open');
            navLinks.classList.toggle('open');
            this.setAttribute('aria-expanded', isOpen);
        });
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    hamburguesa.classList.remove('open');
                    navLinks.classList.remove('open');
                    hamburguesa.setAttribute('aria-expanded', 'false');
                }
            });
        });

        // Transición entre páginas
        document.querySelectorAll('a').forEach(link => {
            if (link.hostname === window.location.hostname &&
                !link.href.includes('#') &&
                link.target !== '_blank') {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const href = this.href;
                    document.body.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    document.body.style.opacity = '0';
                    document.body.style.transform = 'translateY(-8px)';
                    setTimeout(() => window.location.href = href, 300);
                });
            }
        });
    </script>
