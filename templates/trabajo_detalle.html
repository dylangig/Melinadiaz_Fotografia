{% extends "base.html" %}

{% block contenido %}
<div class="galeria-full-wrapper">
    
    <div class="encabezado-minimalista">
        <h1 class="titulo-galeria">Sesión de {{ trabajo.nombre }}</h1>
        <a href="{{ url_for('ver_categoria', categoria_slug=categoria) }}" class="link-volver">
            &larr; Volver a {{ categoria.replace('_', ' ').capitalize() }}
        </a>
    </div>

    <div class="grilla-fotografica">
    {% for foto in fotos %}
    <div class="item-foto">
        <a href="{{ url_for('static', filename='imagenes/' + categoria + '/' + trabajo.slug + '/' + foto) }}" 
           class="glightbox" 
           data-gallery="galeria-sesion"> 
            <img src="{{ url_for('static', filename='imagenes/' + categoria + '/' + trabajo.slug + '/' + foto) }}" 
                 alt="Foto {{ loop.index }}"
                 loading="lazy">
        </a>
    </div>
    {% endfor %}
</div>

</div>

<style>
    .galeria-full-wrapper {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
    }

    .encabezado-minimalista {
        text-align: center;
        margin-bottom: 40px;
    }

    .titulo-galeria {
        font-family: 'Playfair Display', serif;
        color: #d81b60;
        font-weight: 300;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 10px;
    }

    .link-volver {
        color: #ff85a2;
        text-decoration: none;
        font-size: 0.9rem;
        text-transform: uppercase;
    }

    .grilla-fotografica {
        display: grid;
        grid-template-columns: repeat(4, 1fr); 
        gap: 15px; 
    }

    .item-foto {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        border-radius: 4px;
        background-color: #f0f0f0;
    }

    .item-foto img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease, filter 0.4s ease;
        cursor: pointer;
    }

    .item-foto:hover img {
        transform: scale(1.05);
        filter: brightness(1.1);
    }

    @media (max-width: 1200px) {
        .grilla-fotografica {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    @media (max-width: 992px) {
        .grilla-fotografica {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 576px) {
        .grilla-fotografica {
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .titulo-galeria {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock %}
