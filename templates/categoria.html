{% extends "base.html" %}

{% block contenido %}
<div class="container mt-5">
    <h1 class="text-center mb-5 titulo-categoria">{{ categoria.replace('_', ' ').capitalize() }}</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for trabajo in trabajos %}
        <div class="col">
            <a href="{{ url_for('ver_fotos_trabajo', categoria=categoria, trabajo=trabajo.slug) }}" class="text-decoration-none">
                <div class="tarjeta-horizontal">
                    <img src="{{ url_for('static', filename='imagenes/' + categoria + '/' + trabajo.slug + '/' + (trabajo.fotos[0] if trabajo.fotos else 'default.jpg')) }}" 
                         class="img-flat" alt="{{ trabajo.nombre }}">
                    
                    <div class="overlay-moderno">
                        <div class="text-center">
                            <h3 class="nombre-clienta">{{ trabajo.nombre|upper }}</h3>
                            <span class="badge-año">{{ trabajo.año if trabajo.año else "2026" }}</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .titulo-categoria {
        color: #d81b60;
        font-family: 'Playfair Display', "https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:wght@700&display=swap";
        letter-spacing: 3px;
        margin-bottom: 40px;
    }

    .tarjeta-horizontal {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 2.5 / 1; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .tarjeta-horizontal:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 25px rgba(216, 27, 96, 0.2);
    }

    .img-flat {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    .tarjeta-horizontal:hover .img-flat {
        transform: scale(1.08);
    }

    .overlay-moderno {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .tarjeta-horizontal:hover .overlay-moderno {
        opacity: 1;
    }

    .nombre-clienta {
        color: #ff85a2;
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 2px;
    }

    .badge-anio {
        color: white;
        font-size: 0.8rem;
        border: 1px solid white;
        padding: 2px 10px;
        border-radius: 20px;
        margin-top: 8px;
        display: inline-block;
    }
</style>
{% endblock %}
